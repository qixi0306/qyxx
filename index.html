            align-items: flex-end;
            gap: 8px;
            max-width: 88%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0.4; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .message.self { align-self: flex-end; flex-direction: row-reverse; }
        .message.other { align-self: flex-start; }

        .message .bubble {
            padding: 10px 14px;
            border-radius: 20px 20px 6px 20px;
            background: white;
            box-shadow: 0 2px 8px rgba(140, 80, 110, 0.08);
            border: 1px solid rgba(255, 220, 235, 0.3);
            max-width: 100%;
            word-break: break-word;
            line-height: 1.5;
        }
        .message.self .bubble {
            background: #f0d7e4;
            border-radius: 20px 20px 20px 6px;
            border-color: #ecc4d6;
            color: #2d1d26;
        }

        .message .bubble .card-word {
            font-size: 1.15rem;
            font-weight: 500;
            color: #3f2536;
            letter-spacing: 0.5px;
        }
        .message .bubble .card-meaning {
            font-size: 0.82rem;
            color: #6e4a5f;
            margin-top: 3px;
            background: rgba(255, 240, 245, 0.3);
            padding: 0 10px 0 8px;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(255, 200, 215, 0.15);
        }
        .message .bubble .card-tag {
            font-size: 0.6rem;
            color: #9a6b80;
            margin-top: 4px;
            letter-spacing: 0.3px;
            background: rgba(235, 190, 210, 0.1);
            padding: 0 10px;
            border-radius: 30px;
            display: inline-block;
        }
        .message .bubble .timestamp {
            font-size: 0.55rem;
            color: #b08599;
            margin-top: 4px;
            text-align: right;
            opacity: 0.7;
        }
        .message .avatar-small {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f0d7e4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
            border: 1px solid #ffeef4;
            color: #4f2e40;
        }
        .message.self .avatar-small { background: #dbb6cc; }

        /* 底部输入区 */
        .chat-input-area {
            padding: 10px 14px 14px;
            background: rgba(255, 240, 248, 0.5);
            backdrop-filter: blur(6px);
            border-top: 1px solid #f5d6e2;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chat-input-area .input-group {
            display: flex;
            flex: 1;
            gap: 6px;
            min-width: 160px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #f0c8da;
            background: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            color: #2d1d26;
            min-width: 60px;
        }
        .chat-input-area input:focus {
            border-color: #d696b5;
            background: #fff9fc;
            box-shadow: 0 0 0 3px rgba(210, 140, 175, 0.12);
        }
        .chat-input-area input::placeholder {
            color: #b2829b;
            font-weight: 300;
            font-size: 0.8rem;
        }

        .btn {
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.9rem;
            background: #eccadc;
            color: #412b3b;
            border: 1px solid #f0c8da;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .btn:hover { background: #e6b8d0; transform: scale(1.02); border-color: #d696b5; }
        .btn:active { transform: scale(0.94); }
        .btn-primary { background: #f0d7e4; border-color: #ecc4d6; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }

        /* 字卡库面板 */
        .library-panel {
            background: rgba(255, 245, 250, 0.95);
            backdrop-filter: blur(8px);
            border-top: 2px solid #f5d6e2;
            padding: 12px 16px 16px;
            max-height: 260px;
            overflow-y: auto;
            flex-shrink: 0;
            display: none;
            transition: 0.3s;
        }
        .library-panel.open { display: block; }
        .library-panel::-webkit-scrollbar { width: 3px; }
        .library-panel::-webkit-scrollbar-thumb { background: #dbb6cc; border-radius: 20px; }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .library-header h4 {
            font-weight: 400;
            color: #4f2e40;
            letter-spacing: 1px;
            font-size: 0.95rem;
        }
        .library-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .library-item {
            background: rgba(255, 240, 248, 0.5);
            border-radius: 40px;
            padding: 6px 12px 6px 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 3px 4px 3px 0;
            border: 1px solid #f0d0df;
            font-size: 0.85rem;
            transition: 0.15s;
        }
        .library-item:hover { background: #ffeef4; }
        .library-item .del-btn {
            background: none;
            border: none;
            color: #b05a7a;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0 2px;
            opacity: 0.5;
            transition: 0.15s;
        }
        .library-item .del-btn:hover { opacity: 1; color: #d04060; }

        .library-add-area {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 6px;
            align-items: center;
        }
        .library-add-area input {
            flex: 1 1 100px;
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid #f0c8da;
            background: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            outline: none;
            min-width: 60px;
        }
        .library-add-area input:focus { border-color: #d696b5; }

        .empty-chat { text-align: center; padding: 30px 10px; color: #a05a7a; opacity: 0.6; font-size: 0.9rem; }
        .chat-footer {
            padding: 4px 12px 8px;
            text-align: center;
            font-size: 0.55rem;
            color: #b2829b;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(220, 160, 185, 0.1);
            background: rgba(255, 240, 248, 0.1);
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .chat-footer span { background: rgba(255, 215, 225, 0.1); padding: 0 8px; border-radius: 30px; }

        @media (max-width: 480px) {
            .chat-app { border-radius: 28px; height: 90vh; max-height: 90vh; }
            .chat-header { padding: 12px 14px 8px; }
            .chat-messages { padding: 10px 8px 4px; gap: 10px; }
            .message { max-width: 92%; }
            .chat-input-area { padding: 8px 10px 12px; gap: 4px; }
            .chat-input-area .input-group { min-width: 120px; flex-wrap: wrap; }
            .chat-input-area input { padding: 8px 10px; font-size: 0.8rem; min-width: 50px; }
            .btn { padding: 8px 12px; font-size: 0.8rem; }
            .library-panel { padding: 10px 12px; max-height: 200px; }
        }
    </style>
</head>
<body>

<div class="chat-app" id="app">
    <!-- 顶部 -->
    <div class="chat-header">
        <div class="avatar">🌸</div>
        <div class="info">
            <div class="name">星野 · 爱人</div>
            <div class="status">💕 在线 · 只为你</div>
        </div>
        <div class="action-icon" id="toggleLibraryBtn" title="字卡库">📚</div>
    </div>

    <!-- 消息列表 -->
    <div class="chat-messages" id="messageContainer">
        <div class="empty-chat">✨ 发送你们的第一张字卡吧 ✨</div>
    </div>

    <!-- 字卡库面板 -->
    <div class="library-panel" id="libraryPanel">
        <div class="library-header">
            <h4>📖 字卡库 · 表情包 & 颜文字</h4>
            <div class="library-actions">
                <button class="btn btn-sm btn-primary" id="addEmojiBtn">➕ 表情</button>
                <button class="btn btn-sm btn-primary" id="addKaomojiBtn">➕ 颜文字</button>
            </div>
        </div>
        <div id="libraryList" style="display: flex; flex-wrap: wrap; gap: 2px 6px; padding: 2px 0;"></div>
        <div class="library-add-area">
            <input type="text" id="newLibraryWord" placeholder="关键词 (如 月白)">
            <input type="text" id="newLibraryMeaning" placeholder="诠释 / 表情 / 颜文字">
            <button class="btn btn-sm" id="addLibraryBtn">➕ 添加到库</button>
        </div>
        <div style="margin-top: 6px; font-size: 0.7rem; color: #b2829b; text-align: right;">点击 ❌ 删除字卡</div>
    </div>

    <!-- 底部输入 -->
    <div class="chat-input-area">
        <div class="input-group">
            <input type="text" id="wordInput" placeholder="关键词…" maxlength="30">
            <input type="text" id="meaningInput" placeholder="诠释 / 颜文字…" maxlength="50">
        </div>
        <button class="btn" id="sendBtn"><span>✎</span> 发送</button>
    </div>

    <div class="chat-footer">
        <span>💬 无AI · 纯手工</span>
        <span>❤️ 你与星野</span>
        <span>📚 字卡库可编辑</span>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ---------- 数据 ----------
        const MY_NAME = '我';
        const LOVER_NAME = '星野';

        // 消息存储
        let messages = [];
        // 字卡库 (包含表情包、颜文字)
        let libraryCards = [];

        // 默认初始消息
        const DEFAULT_MESSAGES = [
            { id: Date.now()+1, sender: LOVER_NAME, word: '🌸 浅樱', meaning: '「春日初绽，是见到你时的心跳」', tag: '🌸 约定', time: new Date(Date.now()-3600000).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) },
            { id: Date.now()+2, sender: MY_NAME, word: '🌙 月白', meaning: '「如月光般温柔，只为你一人明亮」', tag: '✨ 专属', time: new Date(Date.now()-1800000).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) },
            { id: Date.now()+3, sender: LOVER_NAME, word: '💫 星迹', meaning: '「沿着光年的轨迹，抵达你的身边」', tag: '🌠 永恒', time: new Date(Date.now()-600000).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) }
        ];

        // 默认字卡库 (包含表情包、颜文字)
        const DEFAULT_LIBRARY = [
            { word: '🌸 浅樱', meaning: '春日初绽', tag: '🌸' },
            { word: '🌙 月白', meaning: '温柔如月', tag: '✨' },
            { word: '🍃 风音', meaning: '林间私语', tag: '🍀' },
            { word: '💫 星迹', meaning: '光年之约', tag: '🌠' },
            { word: '🌊 海声', meaning: '潮汐想念', tag: '🌊' },
            { word: '☕ 暖茶', meaning: '掌心的温度', tag: '🍵' },
            // 表情包/颜文字 作为特殊字卡
            { word: '😊 微笑', meaning: '（＾▽＾）', tag: '💕' },
            { word: '😂 笑泪', meaning: ' (≧∇≦)ﾉ', tag: '😂' },
            { word: '✨ 星星眼', meaning: ' ✧*｡٩(ˊᗜˋ*)و✧*｡', tag: '🌟' },
            { word: '🌸 花见', meaning: ' (◕‿◕)♡', tag: '🌸' },
            { word: '🍀 幸运', meaning: ' (っ˘ω˘ς) ', tag: '🍀' },
            { word: '🎵 音符', meaning: ' ♪(´▽｀) ', tag: '🎶' }
        ];

        // ---------- 存储 ----------
        function loadData() {
            const storedMsg = localStorage.getItem('chat_messages_v2');
            if (storedMsg) {
                try { const p = JSON.parse(storedMsg); if (Array.isArray(p) && p.length) { messages = p; } }
                catch(e) {}
            }
            if (!messages || messages.length === 0) {
                messages = DEFAULT_MESSAGES.map(m => ({ ...m }));
            }

            const storedLib = localStorage.getItem('chat_library_v2');
            if (storedLib) {
                try { const p = JSON.parse(storedLib); if (Array.isArray(p) && p.length) { libraryCards = p; } }
                catch(e) {}
            }
            if (!libraryCards || libraryCards.length === 0) {
                libraryCards = DEFAULT_LIBRARY.map(c => ({ ...c }));
            }
            saveAll();
        }

        function saveAll() {
            localStorage.setItem('chat_messages_v2', JSON.stringify(messages));
            localStorage.setItem('chat_library_v2', JSON.stringify(libraryCards));
        }

        function generateId() { return Date.now() + Math.floor(Math.random() * 10000); }
        function getCurrentTime() { return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }); }

        // ---------- 渲染消息 ----------
        const container = document.getElementById('messageContainer');
        function renderMessages() {
            container.innerHTML = '';
            if (!messages || messages.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-chat';
                empty.textContent = '💌 还没有字卡呢，发一张给星野吧 💌';
                container.appendChild(empty);
                return;
            }
            const sorted = [...messages].sort((a,b) => a.id - b.id);
            sorted.forEach(msg => {
                const isSelf = (msg.sender === MY_NAME);
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isSelf ? 'self' : 'other'}`;
                const avatar = document.createElement('div');
                avatar.className = 'avatar-small';
                avatar.textContent = isSelf ? '🧸' : '🌸';
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const wordSpan = document.createElement('div');
                wordSpan.className = 'card-word';
                wordSpan.textContent = msg.word || '💖';
                const meaningSpan = document.createElement('div');
                meaningSpan.className = 'card-meaning';
                meaningSpan.textContent = msg.meaning || '';
                const tagSpan = document.createElement('div');
                tagSpan.className = 'card-tag';
                tagSpan.textContent = msg.tag || '❤️';
                const timeSpan = document.createElement('div');
                timeSpan.className = 'timestamp';
                timeSpan.textContent = msg.time || getCurrentTime();
                bubble.appendChild(wordSpan);
                if (msg.meaning) bubble.appendChild(meaningSpan);
                bubble.appendChild(tagSpan);
                bubble.appendChild(timeSpan);
                msgDiv.appendChild(avatar);
                msgDiv.appendChild(bubble);
                container.appendChild(msgDiv);
            });
            container.scrollTop = container.scrollHeight;
        }

        // ---------- 渲染字卡库 ----------
        const libraryList = document.getElementById('libraryList');
        function renderLibrary() {
            libraryList.innerHTML = '';
            if (!libraryCards || libraryCards.length === 0) {
                const empty = document.createElement('span');
                empty.style.color = '#b2829b';
                empty.style.fontSize = '0.8rem';
                empty.textContent = '库为空，添加一些字卡吧 ✨';
                libraryList.appendChild(empty);
                return;
            }
            libraryCards.forEach((card, index) => {
                const item = document.createElement('span');
                item.className = 'library-item';
                item.innerHTML = `
                    <span>${card.word || '📌'} ${card.meaning ? '· ' + card.meaning : ''} ${card.tag ? ' ' + card.tag : ''}</span>
                    <button class="del-btn" data-index="${index}" title="删除">✕</button>
                `;
                libraryList.appendChild(item);
            });

            // 删除事件
            document.querySelectorAll('.library-item .del-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const idx = parseInt(this.dataset.index, 10);
                    if (!isNaN(idx) && idx >= 0 && idx < libraryCards.length) {
                        if (confirm(`删除字卡「${libraryCards[idx].word}」？`)) {
                            libraryCards.splice(idx, 1);
                            saveAll();
                            renderLibrary();
                        }
                    }
                });
            });
        }

        // ---------- 发送字卡 (从输入) ----------
        function sendCardFromInput(word, meaning) {
            if (!word || word.trim() === '') {
                document.getElementById('wordInput').focus();
                return false;
            }
            const newMsg = {
                id: generateId(),
                sender: MY_NAME,
                word: word.trim(),
                meaning: meaning ? meaning.trim() : '',
                tag: '💕 此刻',
                time: getCurrentTime()
            };
            messages.push(newMsg);
            saveAll();
            renderMessages();
            // 清空输入
            document.getElementById('wordInput').value = '';
            document.getElementById('meaningInput').value = '';
            document.getElementById('wordInput').focus();
            // 模拟爱人回复
            simulateLoverReply();
            return true;
        }

        // ---------- 模拟爱人回复 (从字卡库随机) ----------
        function simulateLoverReply() {
            if (!libraryCards || libraryCards.length === 0) {
                // 若库为空，使用默认备用
                const fallback = { word: '🌸 花见', meaning: '与你相遇', tag: '🌸' };
                setTimeout(() => {
                    if (messages.length > 0 && messages[messages.length-1].sender === LOVER_NAME) return;
                    const reply = { id: generateId()+1, sender: LOVER_NAME, word: fallback.word, meaning: fallback.meaning, tag: fallback.tag + ' ✦', time: getCurrentTime() };
                    messages.push(reply);
                    saveAll();
                    renderMessages();
                }, 1500 + Math.random()*2000);
                return;
            }

            const delay = 1500 + Math.random() * 2500;
            setTimeout(() => {
                if (messages.length > 0 && messages[messages.length-1].sender === LOVER_NAME) return;
                const randomIndex = Math.floor(Math.random() * libraryCards.length);
                const card = libraryCards[randomIndex];
                if (!card) return;
                const reply = {
                    id: generateId()+1,
                    sender: LOVER_NAME,
                    word: card.word || '🌸',
                    meaning: card.meaning || '',
                    tag: (card.tag || '❤️') + ' ✦',
                    time: getCurrentTime()
                };
                messages.push(reply);
                saveAll();
                renderMessages();
            }, delay);
        }

        // ---------- 添加到字卡库 ----------
        function addToLibrary(word, meaning, tag) {
            word = word.trim();
            if (!word) return false;
            const newCard = {
                word: word,
                meaning: (meaning || '').trim(),
                tag: (tag || '❤️').trim()
            };
            libraryCards.push(newCard);
            saveAll();
            renderLibrary();
            return true;
        }

        // ---------- 从库中快速发送 (点击库中字卡) ----------
        function sendFromLibrary(index) {
            const card = libraryCards[index];
            if (!card) return;
            const word = card.word || '🌸';
            const meaning = card.meaning || '';
            sendCardFromInput(word, meaning);
        }

        // ---------- 事件绑定 ----------
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderMessages();
            renderLibrary();

            // 发送按钮
            document.getElementById('sendBtn').addEventListener('click', function() {
                const word = document.getElementById('wordInput').value;
                const meaning = document.getElementById('meaningInput').value;
                sendCardFromInput(word, meaning);
            });

            // 回车
            document.getElementById('wordInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (this.value.trim()) {
                        const meaning = document.getElementById('meaningInput').value;
                        sendCardFromInput(this.value, meaning);
                    } else {
                        document.getElementById('meaningInput').focus();
                    }
                }
            });
            document.getElementById('meaningInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const word = document.getElementById('wordInput').value;
                    if (word.trim()) {
                        sendCardFromInput(word, this.value);
                    } else {
                        document.getElementById('wordInput').focus();
                    }
                }
            });

            // 字卡库面板切换
            const panel = document.getElementById('libraryPanel');
            document.getElementById('toggleLibraryBtn').addEventListener('click', function() {
                panel.classList.toggle('open');
                if (panel.classList.contains('open')) {
                    renderLibrary();
                }
            });

            // 添加到库
            document.getElementById('addLibraryBtn').addEventListener('click', function() {
                const word = document.getElementById('newLibraryWord').value;
                const meaning = document.getElementById('newLibraryMeaning').value;
                if (addToLibrary(word, meaning)) {
                    document.getElementById('newLibraryWord').value = '';
                    document.getElementById('newLibraryMeaning').value = '';
                    // 可选：自动关闭面板？
                } else {
                    document.getElementById('newLibraryWord').focus();
                }
            });

            // 快速添加表情/颜文字
            document.getElementById('addEmojiBtn').addEventListener('click', function() {
                const emojis = ['😊', '😂', '🥰', '😍', '🤗', '✨', '🌟', '💖', '🌸', '🍀', '🎵', '🌈'];
                const rand = emojis[Math.floor(Math.random() * emojis.length)];
                document.getElementById('newLibraryWord').value = rand + ' 表情';
                document.getElementById('newLibraryMeaning').value = ' (◕‿◕)♡ ';
                document.getElementById('addLibraryBtn').click();
            });
            document.getElementById('addKaomojiBtn').addEventListener('click', function() {
                const kaomoji = ['(＾▽＾)', '(≧∇≦)', '(◕‿◕)♡', '✧*｡٩(ˊᗜˋ*)و✧*｡', '(っ˘ω˘ς)', '♪(´▽｀)'];
                const rand = kaomoji[Math.floor(Math.random() * kaomoji.length)];
                document.getElementById('newLibraryWord').value = '✨ 颜文字';
                document.getElementById('newLibraryMeaning').value = rand;
                document.getElementById('addLibraryBtn').click();
            });

            // 点击库中字卡快速发送 (委托)
            libraryList.addEventListener('click', function(e) {
                const item = e.target.closest('.library-item');
                if (!item) return;
                // 如果点击的是删除按钮，不触发发送
                if (e.target.classList.contains('del-btn')) return;
                const index = Array.from(libraryList.children).indexOf(item);
                if (index >= 0 && index < libraryCards.length) {
                    sendFromLibrary(index);
                }
            });

            // 双击顶部重置 (保留)
            document.querySelector('.chat-header').addEventListener('dblclick', function() {
                if (confirm('重置聊天记录？ (保留字卡库)')) {
                    messages = DEFAULT_MESSAGES.map(m => ({ ...m }));
                    saveAll();
                    renderMessages();
                }
