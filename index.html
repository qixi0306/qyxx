<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💌 字卡 · 聊天室 💌</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Noto Sans TC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; }
        body { background: #efe4e9; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 12px; }
        .chat-app { max-width: 480px; width: 100%; height: 780px; max-height: 95vh; background: #fcf5f9; border-radius: 42px 42px 32px 32px; box-shadow: 0 20px 50px rgba(140,80,110,0.25), 0 0 0 1px rgba(255,220,235,0.5); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .chat-header { padding: 10px 14px 8px; background: rgba(255,240,248,0.7); backdrop-filter: blur(6px); border-bottom: 1px solid #f5d6e2; display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
        .chat-header .avatar-wrapper { position: relative; cursor: pointer; flex-shrink: 0; }
        .chat-header .avatar-wrapper .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; border: 2px solid #ffeef4; box-shadow: 0 2px 8px rgba(140,80,110,0.1); transition: 0.2s; background: #f0d7e4; }
        .chat-header .avatar-wrapper:hover .avatar { filter: brightness(0.92); }
        .chat-header .avatar-wrapper .badge { position: absolute; bottom: -2px; right: -2px; background: rgba(255,255,255,0.85); border-radius: 30px; font-size: 0.45rem; padding: 0 5px; border: 1px solid #f5d6e2; color: #7a4d64; }
        .chat-header .info { flex: 1; cursor: pointer; min-width: 60px; }
        .chat-header .info .name { font-size: 1.0rem; font-weight: 500; color: #3f2536; letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 4px; }
        .chat-header .info .name .edit-hint { font-size: 0.5rem; color: #b2829b; opacity: 0.5; }
        .chat-header .info .status { font-size: 0.6rem; color: #a05a7a; background: rgba(210,160,180,0.15); padding: 0 10px; border-radius: 30px; display: inline-block; border: 1px solid rgba(255,200,215,0.2); }
        .chat-header .action-icons { display: flex; gap: 4px; flex-wrap: wrap; }
        .chat-header .action-icon { font-size: 1.1rem; color: #a05a7a; cursor: pointer; opacity: 0.7; transition: 0.2s; padding: 4px 6px; border-radius: 30px; background: rgba(255,240,248,0.3); border: 1px solid transparent; }
        .chat-header .action-icon:hover { opacity: 1; background: rgba(255,200,215,0.2); border-color: #f5d6e2; }
        .chat-header .action-icon.active { opacity: 1; background: rgba(210,160,180,0.2); border-color: #dbb6cc; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px 12px 4px; display: flex; flex-direction: column; gap: 10px; background: rgba(250,240,245,0.2); scroll-behavior: smooth; }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #dbb6cc; border-radius: 20px; }
        .message { display: flex; align-items: flex-end; gap: 6px; max-width: 88%; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0.4; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .message.self { align-self: flex-end; flex-direction: row-reverse; }
        .message.other { align-self: flex-start; }
        .message .bubble { padding: 8px 12px; border-radius: 18px 18px 6px 18px; background: white; box-shadow: 0 2px 8px rgba(140,80,110,0.08); border: 1px solid rgba(255,220,235,0.3); max-width: 100%; word-break: break-word; line-height: 1.4; }
        .message.self .bubble { background: #f0d7e4; border-radius: 18px 18px 18px 6px; border-color: #ecc4d6; color: #2d1d26; }
        .message .bubble .card-word { font-size: 1.0rem; font-weight: 500; color: #3f2536; }
        .message .bubble .card-meaning { font-size: 0.75rem; color: #6e4a5f; margin-top: 2px; background: rgba(255,240,245,0.3); padding: 0 8px; border-radius: 30px; display: inline-block; }
        .message .bubble .card-tag { font-size: 0.55rem; color: #9a6b80; margin-top: 3px; letter-spacing: 0.3px; background: rgba(235,190,210,0.1); padding: 0 8px; border-radius: 30px; display: inline-block; }
        .message .bubble .timestamp { font-size: 0.5rem; color: #b08599; margin-top: 3px; text-align: right; opacity: 0.7; }
        .message .bubble .msg-type { font-size: 0.6rem; color: #b08599; margin-bottom: 2px; font-weight: 300; }
        .message .avatar-small { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; border: 1px solid #ffeef4; background: #f0d7e4; }
        .message.self .avatar-small { background: #dbb6cc; }
        .message .bubble .redpacket { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: #fff; padding: 8px 16px; border-radius: 12px; display: inline-block; font-weight: 500; cursor: pointer; border: 1px solid #d63031; }
        .message .bubble .redpacket:hover { transform: scale(1.02); }
        .message .bubble .redpacket .rp-amount { font-size: 1.2rem; }
        .message .bubble .drawing-canvas { border: 1px solid #f0c8da; border-radius: 12px; background: #fff; max-width: 180px; max-height: 120px; cursor: pointer; }
        .chat-input-area { padding: 8px 12px 12px; background: rgba(255,240,248,0.5); backdrop-filter: blur(6px); border-top: 1px solid #f5d6e2; display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
        .chat-input-area .input-group { display: flex; flex: 1; gap: 4px; min-width: 120px; }
        .chat-input-area input { flex: 1; padding: 8px 12px; border-radius: 40px; border: 1px solid #f0c8da; background: rgba(255,255,255,0.7); font-size: 0.85rem; outline: none; transition: 0.2s; color: #2d1d26; min-width: 50px; }
        .chat-input-area input:focus { border-color: #d696b5; background: #fff9fc; box-shadow: 0 0 0 3px rgba(210,140,175,0.12); }
        .chat-input-area input::placeholder { color: #b2829b; font-weight: 300; font-size: 0.75rem; }
        .btn { border: none; border-radius: 40px; padding: 8px 14px; font-size: 0.8rem; background: #eccadc; color: #412b3b; border: 1px solid #f0c8da; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
        .btn:hover { background: #e6b8d0; transform: scale(1.02); border-color: #d696b5; }
        .btn:active { transform: scale(0.94); }
        .btn-primary { background: #f0d7e4; border-color: #ecc4d6; }
        .btn-success { background: #d4e0d4; border-color: #b8c8b8; }
        .btn-success:hover { background: #c8d8c8; }
        .btn-warning { background: #f5e0c0; border-color: #e8c8a0; }
        .btn-danger { background: #f0c8c8; border-color: #e0a8a8; }
        .btn-sm { padding: 4px 10px; font-size: 0.7rem; }
        .btn-xs { padding: 2px 8px; font-size: 0.6rem; }
        .library-panel { background: rgba(255,245,250,0.95); backdrop-filter: blur(8px); border-top: 2px solid #f5d6e2; padding: 10px 14px 14px; max-height: 200px; overflow-y: auto; flex-shrink: 0; display: none; transition: 0.3s; }
        .library-panel.open { display: block; }
        .library-panel::-webkit-scrollbar { width: 3px; }
        .library-panel::-webkit-scrollbar-thumb { background: #dbb6cc; border-radius: 20px; }
        .library-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 4px; }
        .library-header h4 { font-weight: 400; color: #4f2e40; font-size: 0.85rem; }
        .library-actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .library-item { background: rgba(255,240,248,0.5); border-radius: 40px; padding: 4px 10px 4px 14px; display: inline-flex; align-items: center; gap: 4px; margin: 2px 3px 2px 0; border: 1px solid #f0d0df; font-size: 0.75rem; transition: 0.15s; cursor: pointer; }
        .library-item:hover { background: #ffeef4; }
        .library-item .del-btn { background: none; border: none; color: #b05a7a; cursor: pointer; font-size: 0.8rem; padding: 0 2px; opacity: 0.5; }
        .library-item .del-btn:hover { opacity: 1; color: #d04060; }
        .library-add-area { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; align-items: center; }
        .library-add-area input { flex: 1 1 80px; padding: 4px 10px; border-radius: 40px; border: 1px solid #f0c8da; background: rgba(255,255,255,0.6); font-size: 0.75rem; outline: none; min-width: 50px; }
        .library-add-area input:focus { border-color: #d696b5; }
        .batch-area { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; width: 100%; }
        .batch-area textarea { flex: 1; padding: 6px 10px; border-radius: 12px; border: 1px solid #f0c8da; background: rgba(255,255,255,0.6); font-size: 0.7rem; outline: none; resize: vertical; min-height: 40px; font-family: inherit; }
        .batch-area textarea:focus { border-color: #d696b5; }
        .empty-chat { text-align: center; padding: 20px 10px; color: #a05a7a; opacity: 0.6; font-size: 0.85rem; }
        .chat-footer { padding: 3px 10px 6px; text-align: center; font-size: 0.5rem; color: #b2829b; letter-spacing: 0.5px; border-top: 1px solid rgba(220,160,185,0.1); background: rgba(255,240,248,0.1); display: flex; justify-content: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
        .chat-footer span { background: rgba(255,215,225,0.1); padding: 0 6px; border-radius: 30px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: #fff8fa; border-radius: 28px; padding: 20px 20px 18px; max-width: 320px; width: 90%; box-shadow: 0 30px 60px rgba(80,40,60,0.3); border: 1px solid #f5d6e2; }
        .modal-box h3 { font-weight: 400; color: #3f2536; margin-bottom: 12px; font-size: 1.0rem; text-align: center; }
        .modal-box .field { margin-bottom: 10px; }
        .modal-box .field label { display: block; font-size: 0.7rem; color: #7a4d64; margin-bottom: 3px; }
        .modal-box .field input { width: 100%; padding: 8px 12px; border-radius: 40px; border: 1px solid #f0c8da; background: rgba(255,255,255,0.7); font-size: 0.9rem; outline: none; }
        .modal-box .field input:focus { border-color: #d696b5; }
        .modal-box .field .emoji-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .modal-box .field .emoji-grid span { font-size: 1.6rem; cursor: pointer; padding: 2px 4px; border-radius: 16px; border: 2px solid transparent; }
        .modal-box .field .emoji-grid span:hover { background: #f5d6e2; border-color: #e8a6c2; }
        .modal-box .field .emoji-grid span.selected { background: #f0d7e4; border-color: #d696b5; }
        .modal-box .btn-row { display: flex; gap: 8px; margin-top: 12px; }
        .modal-box .btn-row .btn { flex: 1; justify-content: center; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(60,40,55,0.85); color: #fff; padding: 6px 20px; border-radius: 40px; font-size: 0.8rem; backdrop-filter: blur(6px); z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .call-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1500; flex-direction: column; gap: 20px; }
        .call-overlay.active { display: flex; }
        .call-box { background: #fff8fa; border-radius: 40px; padding: 30px 40px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .call-box .call-avatar { font-size: 4rem; margin-bottom: 10px; }
        .call-box .call-name { font-size: 1.2rem; color: #3f2536; }
        .call-box .call-status { font-size: 0.8rem; color: #a05a7a; margin: 6px 0 16px; }
        .call-box .call-btns { display: flex; gap: 20px; justify-content: center; }
        .call-box .call-btns .btn { padding: 12px 24px; font-size: 1.2rem; border-radius: 50%; width: 64px; height: 64px; justify-content: center; }
        .drawing-modal .modal-box { max-width: 360px; }
        .drawing-modal .canvas-wrapper { background: #fff; border-radius: 16px; border: 1px solid #f0c8da; margin: 8px 0; }
        .drawing-modal canvas { width: 100%; height: auto; border-radius: 16px; touch-action: none; }
        @media (max-width: 480px) { .chat-app { border-radius: 28px; height: 90vh; max-height: 90vh; } .chat-header { padding: 8px 10px 6px; } .chat-header .avatar-wrapper .avatar { width: 34px; height: 34px; font-size: 1.3rem; } .chat-header .action-icon { font-size: 0.95rem; padding: 3px 5px; } .chat-messages { padding: 8px 8px 4px; gap: 8px; } .message { max-width: 92%; } .chat-input-area { padding: 6px 8px 10px; gap: 4px; } .chat-input-area .input-group { min-width: 100px; flex-wrap: wrap; } .chat-input-area input { padding: 6px 10px; font-size: 0.75rem; min-width: 40px; } .btn { padding: 6px 10px; font-size: 0.7rem; } .library-panel { padding: 8px 10px; max-height: 160px; } .call-box { padding: 20px; } .call-box .call-btns .btn { width: 50px; height: 50px; padding: 8px; font-size: 1rem; } }
    </style>
</head>
<body>

<div class="chat-app" id="app">
    <!-- 顶部 -->
    <div class="chat-header">
        <div class="avatar-wrapper" id="myAvatarWrapper" title="点击修改我的头像">
            <div class="avatar" id="myAvatar">🧸</div>
            <span class="badge">我</span>
        </div>
        <div class="info" id="headerInfo">
            <div class="name" id="myNameDisplay">我 <span class="edit-hint">✎</span></div>
            <div class="status" id="chatStatus">💕 与 星野</div>
        </div>
        <div class="avatar-wrapper" id="loverAvatarWrapper" title="点击修改星野的头像">
            <div class="avatar" id="loverAvatar">🌸</div>
            <span class="badge">❤️</span>
        </div>
        <div class="action-icons">
            <span class="action-icon" id="toggleLibraryBtn" title="字卡库">📚</span>
            <span class="action-icon" id="callBtn" title="语音/视频通话">📞</span>
            <span class="action-icon" id="drawBtn" title="手绘涂鸦">🎨</span>
            <span class="action-icon" id="redpacketBtn" title="发红包">🧧</span>
            <span class="action-icon" id="emojiPickerBtn" title="颜文字/表情">😊</span>
        </div>
    </div>

    <!-- 消息列表 -->
    <div class="chat-messages" id="messageContainer">
        <div class="empty-chat">✨ 发送你们的第一张字卡吧 ✨</div>
    </div>

    <!-- 字卡库面板 -->
    <div class="library-panel" id="libraryPanel">
        <div class="library-header">
            <h4>📖 字卡库</h4>
            <div class="library-actions">
                <button class="btn btn-sm btn-primary" id="addEmojiBtn">➕ 表情</button>
                <button class="btn btn-sm btn-primary" id="addKaomojiBtn">➕ 颜文字</button>
                <button class="btn btn-sm btn-success" id="batchImportBtn">📥 批量</button>
            </div>
        </div>
        <div id="libraryList" style="display: flex; flex-wrap: wrap; gap: 2px 4px; padding: 2px 0;"></div>
        <div class="library-add-area">
            <input type="text" id="newLibraryWord" placeholder="关键词" maxlength="20">
            <input type="text" id="newLibraryMeaning" placeholder="诠释/表情">
            <button class="btn btn-sm" id="addLibraryBtn">➕ 添加</button>
        </div>
        <div class="batch-area" id="batchArea" style="display:none;">
            <textarea id="batchInput" placeholder="每行：关键词 | 诠释 | 标签"></textarea>
            <div style="display:flex; gap:4px; width:100%; flex-wrap:wrap;">
                <button class="btn btn-sm btn-success" id="batchConfirmBtn">✅ 导入</button>
                <button class="btn btn-sm" id="batchCancelBtn">取消</button>
                <button class="btn btn-sm btn-primary" id="batchTemplateBtn">📋 模板</button>
            </div>
        </div>
    </div>

    <!-- 底部输入 -->
    <div class="chat-input-area">
        <div class="input-group">
            <input type="text" id="wordInput" placeholder="关键词…" maxlength="25">
            <input type="text" id="meaningInput" placeholder="诠释…" maxlength="40">
        </div>
        <button class="btn" id="sendBtn">✎ 发送</button>
    </div>

    <div class="chat-footer">
        <span>💬 无AI</span>
        <span id="chatModeDisplay">💕 私聊</span>
        <span id="memberCount">👥 2人</span>
        <span>📚 可编辑</span>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <h3 id="modalTitle">✎ 编辑信息</h3>
        <div class="field">
            <label>昵称</label>
            <input type="text" id="editNameInput" maxlength="20">
        </div>
        <div class="field">
            <label>头像</label>
            <div class="emoji-grid" id="emojiGrid">
                <span>🧸</span><span>🌸</span><span>🌙</span><span>⭐</span><span>💖</span>
                <span>🌈</span><span>🦋</span><span>🍀</span><span>🌊</span><span>🎀</span>
                <span>✨</span><span>🌺</span><span>🌻</span><span>🎵</span><span>💫</span>
                <span>🪐</span><span>☀️</span><span>🐱</span><span>🐶</span><span>🐰</span>
                <span>🦊</span><span>🐼</span><span>🐨</span><span>🦄</span><span>🍭</span>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn" id="modalCancelBtn">取消</button>
            <button class="btn btn-primary" id="modalSaveBtn">保存</button>
        </div>
    </div>
</div>

<!-- 呼叫弹窗 -->
<div class="call-overlay" id="callOverlay">
    <div class="call-box">
        <div class="call-avatar" id="callAvatar">🌸</div>
        <div class="call-name" id="callName">星野</div>
        <div class="call-status" id="callStatus">📞 呼叫中...</div>
        <div class="call-btns">
            <button class="btn btn-danger" id="callEndBtn">📴</button>
            <button class="btn btn-success" id="callAnswerBtn">📞</button>
        </div>
    </div>
</div>

<!-- 涂鸦弹窗 -->
<div class="modal-overlay drawing-modal" id="drawModal">
    <div class="modal-box">
        <h3>🎨 手绘涂鸦</h3>
        <div class="canvas-wrapper">
            <canvas id="drawCanvas" width="300" height="200"></canvas>
        </div>
        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;">
            <button class="btn btn-sm" id="drawColorBlack">⚫</button>
            <button class="btn btn-sm" id="drawColorRed">🔴</button>
            <button class="btn btn-sm" id="drawColorBlue">🔵</button>
            <button class="btn btn-sm" id="drawColorGreen">🟢</button>
            <button class="btn btn-sm" id="drawColorYellow">🟡</button>
            <button class="btn btn-sm" id="drawClearBtn">🗑️ 清除</button>
            <button class="btn btn-sm btn-success" id="drawSendBtn">✉️ 发送</button>
            <button class="btn btn-sm" id="drawCloseBtn">取消</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    (function() {
        "use strict";

        // ---------- 数据 ----------
        const LOVER_DEFAULT = '星野';
        const MY_DEFAULT = '我';
        let myName = MY_DEFAULT;
        let myAvatar = '🧸';
        let loverName = LOVER_DEFAULT;
        let loverAvatar = '🌸';
        let messages = [];
        let libraryCards = [];
        let chatMode = 'private'; // 'private' or 'group'
        let groupMembers = ['我', '星野', '小樱', '小枫'];

        const DEFAULT_MESSAGES = [
            { id: Date.now()+1, sender: LOVER_DEFAULT, word: '🌸 浅樱', meaning: '「春日初绽，是见到你时的心跳」', tag: '🌸 约定', time: new Date(Date.now()-3600000).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}), type: 'card' },
            { id: Date.now()+2, sender: MY_DEFAULT, word: '🌙 月白', meaning: '「如月光般温柔，只为你一人明亮」', tag: '✨ 专属', time: new Date(Date.now()-1800000).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}), type: 'card' },
            { id: Date.now()+3, sender: LOVER_DEFAULT, word: '💫 星迹', meaning: '「沿着光年的轨迹，抵达你的身边」', tag: '🌠 永恒', time: new Date(Date.now()-600000).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}), type: 'card' }
        ];

        const DEFAULT_LIBRARY = [
            { word: '🌸 浅樱', meaning: '春日初绽', tag: '🌸' },
            { word: '🌙 月白', meaning: '温柔如月', tag: '✨' },
            { word: '🍃 风音', meaning: '林间私语', tag: '🍀' },
            { word: '💫 星迹', meaning: '光年之约', tag: '🌠' },
            { word: '🌊 海声', meaning: '潮汐想念', tag: '🌊' },
            { word: '☕ 暖茶', meaning: '掌心的温度', tag: '🍵' },
            { word: '😊 微笑', meaning: '（＾▽＾）', tag: '💕' },
            { word: '😂 笑泪', meaning: '(≧∇≦)ﾉ', tag: '😂' },

        // ---------- 存储 ----------
        function loadData() {
            const cfg = localStorage.getItem('chat_config_v3');
            if (cfg) { try { const c = JSON.parse(cfg); if (c.myName) myName = c.myName; if (c.myAvatar) myAvatar = c.myAvatar; if (c.loverName) loverName = c.loverName; if (c.loverAvatar) loverAvatar = c.loverAvatar; } catch(e) {} }
            const msg = localStorage.getItem('chat_messages_v3');
            if (msg) { try { const p = JSON.parse(msg); if (Array.isArray(p) && p.length) messages = p; } catch(e) {} }
            if (!messages || messages.length === 0) messages = DEFAULT_MESSAGES.map(m => ({ ...m }));
            const lib = localStorage.getItem('chat_library_v3');
            if (lib) { try { const p = JSON.parse(lib); if (Array.isArray(p) && p.length) libraryCards = p; } catch(e) {} }
            if (!libraryCards || libraryCards.length === 0) libraryCards = DEFAULT_LIBRARY.map(c => ({ ...c }));
            const mode = localStorage.getItem('chat_mode_v3');
            if (mode === 'group') chatMode = 'group';
            saveAll();
        }

        function saveAll() {
            localStorage.setItem('chat_config_v3', JSON.stringify({ myName, myAvatar, loverName, loverAvatar }));
            localStorage.setItem('chat_messages_v3', JSON.stringify(messages));
            localStorage.setItem('chat_library_v3', JSON.stringify(libraryCards));
            localStorage.setItem('chat_mode_v3', chatMode);
        }

        // ---------- 渲染消息 ----------
        function renderMessages() {
            container.innerHTML = '';
            if (!messages || messages.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-chat';
                empty.textContent = '💌 还没有消息呢';
                container.appendChild(empty);
                return;
            }
            const sorted = [...messages].sort((a,b) => a.id - b.id);
            sorted.forEach(msg => {
                const isSelf = (msg.sender === myName);
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isSelf ? 'self' : 'other'}`;
                const avatar = document.createElement('div');
                avatar.className = 'avatar-small';
                avatar.textContent = isSelf ? myAvatar : (msg.sender === loverName ? loverAvatar : '🌸');
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // 根据类型渲染
                if (msg.type === 'redpacket') {
                    bubble.innerHTML = `
                        <div class="redpacket" onclick="toast('🧧 红包已领取！')">
                            <div>🧧 红包</div>
                            <div class="rp-amount">${msg.amount || '💖'}</div>
                            <div style="font-size:0.6rem;">来自 ${msg.sender}</div>
                        </div>
                        <div class="timestamp">${msg.time || getTime()}</div>
                    `;
                } else if (msg.type === 'drawing') {
                    bubble.innerHTML = `
                        <div class="msg-type">🎨 涂鸦</div>
                        <img src="${msg.imageData}" style="max-width:150px; max-height:100px; border-radius:8px; border:1px solid #f0c8da;">
                        <div class="timestamp">${msg.time || getTime()}</div>
                    `;
                } else if (msg.type === 'emoji') {
                    bubble.innerHTML = `
                        <div style="font-size:1.8rem;">${msg.word || '😊'}</div>
                        <div style="font-size:0.7rem; color:#6e4a5f;">${msg.meaning || ''}</div>
                        <div class="timestamp">${msg.time || getTime()}</div>
                    `;
                } else {
                    // 普通字卡
                    const wordSpan = document.createElement('div');
                    wordSpan.className = 'card-word';
                    wordSpan.textContent = msg.word || '💖';
                    const meaningSpan = document.createElement('div');
                    meaningSpan.className = 'card-meaning';
                    meaningSpan.textContent = msg.meaning || '';
                    const tagSpan = document.createElement('div');
                    tagSpan.className = 'card-tag';
                    tagSpan.textContent = msg.tag || '❤️';
                    const timeSpan = document.createElement('div');
                    timeSpan.className = 'timestamp';
                    timeSpan.textContent = msg.time || getTime();
                    bubble.appendChild(wordSpan);
                    if (msg.meaning) bubble.appendChild(meaningSpan);
                    bubble.appendChild(tagSpan);
                    bubble.appendChild(timeSpan);
                }
                msgDiv.appendChild(avatar);
                msgDiv.appendChild(bubble);
                container.appendChild(msgDiv);
            });
            container.scrollTop = container.scrollHeight;
        }

        // ---------- 渲染字卡库 ----------
        function renderLibrary() {
            libraryList.innerHTML = '';
            if (!libraryCards || libraryCards.length === 0) {
                const empty = document.createElement('span');
                empty.style.color = '#b2829b';
                empty.style.fontSize = '0.75rem';
                empty.textContent = '库为空 ✨';
                libraryList.appendChild(empty);
                return;
            }
            libraryCards.forEach((card, index) => {
                const item = document.createElement('span');
                item.className = 'library-item';
                item.dataset.index = index;
                item.innerHTML = `
                    <span>${card.word || '📌'} ${card.meaning ? '· ' + card.meaning : ''}</span>
                    <button class="del-btn" data-index="${index}">✕</button>
                `;
                libraryList.appendChild(item);
            });
            document.querySelectorAll('.library-item .del-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const idx = parseInt(this.dataset.index, 10);
                    if (!isNaN(idx) && idx >= 0 && idx < libraryCards.length) {
                        if (confirm(`删除「${libraryCards[idx].word}」？`)) {
                            libraryCards.splice(idx, 1);
                            saveAll();
                            renderLibrary();
                            toast('已删除');
                        }
                    }
                });
            });
            libraryList.querySelectorAll('.library-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.classList.contains('del-btn')) return;
                    const idx = parseInt(this.dataset.index, 10);
                    if (!isNaN(idx) && idx >= 0 && idx < libraryCards.length) {
                        const card = libraryCards[idx];
                        sendCard(card.word || '🌸', card.meaning || '');
                    }
                });
            });
        }

        // ---------- 发送消息 ----------
        function sendCard(word, meaning, type = 'card', extra = {}) {
            if (!word || word.trim() === '') { wordInput.focus(); return false; }
            const msg = {
                id: genId(),
                sender: myName,
                word: word.trim(),
                meaning: meaning ? meaning.trim() : '',
                tag: extra.tag || '💕',
                time: getTime(),
                type: type,
                ...extra
            };
            messages.push(msg);
            saveAll();
            renderMessages();
            wordInput.value = '';
            meaningInput.value = '';
            wordInput.focus();
            if (type === 'card') simulateReply();
            return true;
        }

        // ---------- 模拟回复 ----------
        function simulateReply() {
            if (!libraryCards || libraryCards.length === 0) {
                setTimeout(() => {
                    if (messages.length > 0 && messages[messages.length-1].sender === loverName) return;
                    const reply = { id: genId()+1, sender: loverName, word: '🌸 花见', meaning: '与你相遇', tag: '🌸 ✦', time: getTime(), type: 'card' };
                    messages.push(reply);
                    saveAll();
                    renderMessages();
                }, 1200 + Math.random()*1800);
                return;
            }
            const delay = 1200 + Math.random() * 2000;
            setTimeout(() => {
                if (messages.length > 0 && messages[messages.length-1].sender === loverName) return;
                const card = libraryCards[Math.floor(Math.random() * libraryCards.length)];
                if (!card) return;
                const reply = { id: genId()+1, sender: loverName, word: card.word, meaning: card.meaning || '', tag: (card.tag || '❤️') + ' ✦', time: getTime(), type: 'card' };
                messages.push(reply);
                saveAll();
                renderMessages();
            }, delay);
        }

        // ---------- 添加字卡库 ----------
        function addToLibrary(word, meaning, tag) {
            word = word.trim();
            if (!word) return false;
            libraryCards.push({ word, meaning: (meaning || '').trim(), tag: (tag || '❤️').trim() });
            saveAll();
            renderLibrary();
            return true;
        }

        // ---------- 批量导入 ----------
        function batchImport(text) {
            const lines = text.split('\n').filter(l => l.trim() !== '');
            if (lines.length === 0) { toast('⚠️ 没有内容'); return false; }
            let added = 0;
            lines.forEach(line => {
                const parts = line.split(/[|，,、\t]/).map(s => s.trim());
                if (parts.length >= 1) {
                    if (addToLibrary(parts[0], parts.length > 1 ? parts[1] : '', parts.length > 2 ? parts[2] : '❤️')) added++;
                }
            });
            if (added > 0) { toast(`✅ 导入 ${added} 张`); renderLibrary(); return true; }
            else { toast('⚠️ 格式错误'); return false; }
        }

        // ---------- 呼叫功能 ----------

        // ---------- 涂鸦功能 ----------
        let isDrawing = false;
        let drawColor = '#000000';
        function initCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000000';
        }
        function getCanvasPos(e) {
            const rect = drawCanvas.getBoundingClientRect();
            const scaleX = drawCanvas.width / rect.width;
            const scaleY = drawCanvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }
        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getCanvasPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }
        function moveDraw(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const pos = getCanvasPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }
        function endDraw(e) {
            e.preventDefault();
            isDrawing = false;
        }
        function clearCanvas() { ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height); }
        function sendDrawing() {
            const dataUrl = drawCanvas.toDataURL('image/png');
            if (dataUrl === drawCanvas.toDataURL('image/png')) {
                // 检查是否空白
                const imageData = ctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
                const pixels = imageData.data;
                let empty = true;
                for (let i = 3; i < pixels.length; i += 4) {
                    if (pixels[i] !== 0) { empty = false; break; }
                }
                if (empty) { toast('⚠️ 画点东西再发送吧'); return; }
            }
            const msg = {
                id: genId(),
                sender: myName,
                word: '🎨 涂鸦',
                meaning: '',
                tag: '🎨',
                time: getTime(),
                type: 'drawing',
                imageData: dataUrl
            };
            messages.push(msg);
            saveAll();
            renderMessages();
            drawModal.classList.remove('active');
            clearCanvas();
            toast('🎨 涂鸦已发送');
            simulateReply();
        }

            const kaomoji = ['(＾▽＾)', '(≧∇≦)', '(◕‿◕)♡', '✧*｡٩(ˊᗜˋ*)و✧*｡', '(っ˘ω˘ς)', '♪(´▽｀)', '(｡•̀ᴗ-)✧', '٩(◕‿◕｡)۶', '(◠‿◠✿)', '♡(◕ᴗ◕✿)'];

        // ---------- 事件绑定 ----------
        function init() {
            loadData();
            updateUI();

            // 发送
            sendBtn.addEventListener('click', () => sendCard(wordInput.value, meaningInput.value));
            wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); if (wordInput.value.trim()) sendCard(wordInput.value, meaningInput.value); else meaningInput.focus(); } });
            meaningInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); if (wordInput.value.trim()) sendCard(wordInput.value, meaningInput.value); else wordInput.focus(); } });

            addEmojiBtn.addEventListener('click', () => { const em = ['😊','😂','🥰','😍','🤗','✨','🌟','💖','🌸','🍀','🎵','🌈']; const r = em[Math.floor(Math.random()*em.length)]; newWordInput.value = r + ' 表情'; newMeaningInput.value = '(◕‿◕)♡'; addLibraryBtn.click(); });

            batchConfirmBtn.addEventListener('click', () => { if (batchImport(batchInput.value)) { batchArea.style.display = 'none'; batchInput.value = ''; } });

            // 头像/昵称编辑
            myAvatarWrapper.addEventListener('click', () => openEditModal('my'));
            loverAvatarWrapper.addEventListener('click', () => openEditModal('lover'));
            headerInfo.addEventListener('click', () => openEditModal('my'));

            // 弹窗
            emojiGrid.addEventListener('click', e => { if (e.target.tagName === 'SPAN') { document.querySelectorAll('#emojiGrid span').forEach(el => el.classList.remove('selected')); e.target.classList.add('selected'); } });
            modalCancelBtn.addEventListener('click', closeEditModal);
            modalSaveBtn.addEventListener('click', saveEditModal);
            editModal.addEventListener('click', e => { if (e.target === editModal) closeEditModal(); });
            document.addEventListener('keydown', e => { if (e.key === 'Escape' && editModal.classList.contains('active')) closeEditModal(); if (e.key === 'Enter' && editModal.classList.contains('active')) saveEditModal(); });

            // 呼叫
            callBtn.addEventListener('click', startCall);
            callEndBtn.addEventListener('click', endCall);
            callAnswerBtn.addEventListener('click', () => { if (callActive) { callStatus.textContent = '💬 通话中...'; toast('📞 已接听'); } });
            callOverlay.addEventListener('click', e => { if (e.target === callOverlay) endCall(); });

            // 涂鸦
            drawBtn.addEventListener('click', () => { drawModal.classList.add('active'); initCanvas(); });
            drawCloseBtn.addEventListener('click', () => { drawModal.classList.remove('active'); });
            drawSendBtn.addEventListener('click', sendDrawing);
            drawClearBtn.addEventListener('click', clearCanvas);
            [drawColorBlack, drawColorRed, drawColorBlue, drawColorGreen, drawColorYellow].forEach(btn => {
                btn.addEventListener('click', function() {
                    const colors = { '#drawColorBlack': '#000000', '#drawColorRed': '#ff0000', '#drawColorBlue': '#0066ff', '#drawColorGreen': '#00cc00', '#drawColorYellow': '#ffcc00' };
                    drawColor = colors[this.id] || '#000000';
                    ctx.strokeStyle = drawColor;
                });
            });
            drawCanvas.addEventListener('mousedown', startDraw);
            drawCanvas.addEventListener('mousemove', moveDraw);
            drawCanvas.addEventListener('mouseup', endDraw);
            drawCanvas.addEventListener('mouseleave', endDraw);
            drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
            drawCanvas.addEventListener('touchmove', moveDraw, { passive: false });
            drawCanvas.addEventListener('touchend', endDraw, { passive: false });

            // 红包
            redpacketBtn.addEventListener('click', sendRedpacket);

            // 表情选择
            emojiPickerBtn.addEventListener('click', showEmojiPicker);

            // 双击标题切换群聊/私聊
            document.querySelector('.chat-header .info').addEventListener('dblclick', toggleChatMode);

            // 重置聊天 (三击标题)
            let clickCount = 0;
            document.querySelector('.chat-header').addEventListener('click', function() {
                clickCount++;
                if (clickCount >= 5) {
                    clickCount = 0;
                    if (confirm('重置聊天记录？')) {
                        messages = DEFAULT_MESSAGES.map(m => ({ ...m }));
                        saveAll();
                        renderMessages();
                        toast('🔄 已重置');
                    }
                }
                clearTimeout(this._clickTimer);
                this._clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
            });

            console.log('💌 字卡聊天室 v5 已启动');
            console.log('📞 支持语音/视频模拟、涂鸦、红包、颜文字');
            console.log('👥 双击顶部状态可切换私聊/群聊');
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    })();
</script>
</body>
</html>
